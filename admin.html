<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - CALEMA Closet</title>
</head>
<body>
  <h1>Painel Admin</h1>
  <form id="product-form">
    <input id="name" placeholder="Nome do produto" required>
    <input id="price" type="number" step="0.01" placeholder="Preço €" required>
    <select id="size">
      <option value="">Tamanho</option>
      <option>XXS</option><option>XS</option><option>S</option><option>M</option>
      <option>L</option><option>XL</option><option>XXL</option>
      <option>32</option><option>34</option><option>36</option><option>38</option>
      <option>40</option><option>42</option><option>44</option><option>46</option>
      <option>48</option><option>50</option><option>52</option>
      <option>Tamanho único</option>
    </select>
    <select id="cat">
      <option value="">Categoria</option>
      <option>Mulher</option><option>Homem</option><option>Calçado</option>
      <option>Acessórios</option><option>Malas</option><option>Beleza</option>
    </select>
    <input id="imgs" type="file" accept="image/*" multiple>
    <button type="submit">Publicar</button>
    <button type="button" id="update-btn" style="display:none;">Atualizar</button>
  </form>

  <h2>Produtos:</h2>
  <ul id="products-list"></ul>

  <script src="admin.js"></script>
</body>
</html>
